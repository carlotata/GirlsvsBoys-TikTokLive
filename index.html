<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👦 BOYS VS GIRLS 👧</title>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Bungee+Inline&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        bungee: ['Bungee', 'cursive'],
        'bungee-inline': ['"Bungee Inline"', 'cursive'],
        nunito: ['Nunito', 'sans-serif'],
      },
      colors: {
        boy:    '#00d4ff',
        girl:   '#ff3a8c',
        gold:   '#ffe44d',
        panel:  '#09111b',
        border: '#1e2d40',
      },
      keyframes: {
        lp:          { '0%,100%': { boxShadow: '0 0 0 0 #ff3a8c44' }, '60%': { boxShadow: '0 0 0 7px transparent' } },
        skyShift:    { '0%': { filter: 'hue-rotate(0deg) brightness(1)' }, '33%': { filter: 'hue-rotate(15deg) brightness(1.08)' }, '66%': { filter: 'hue-rotate(-10deg) brightness(.95)' }, '100%': { filter: 'hue-rotate(20deg) brightness(1.05)' } },
        auroraPulse: { '0%': { transform: 'translateX(-5%) scaleY(0.7) skewX(-5deg)' }, '40%': { transform: 'translateX(3%) scaleY(1.2) skewX(3deg)' }, '100%': { transform: 'translateX(8%) scaleY(0.9) skewX(-2deg)' } },
        floatUp:     { '0%': { opacity: '0', transform: 'translateY(0) scale(0.5)' }, '10%': { opacity: '0.7' }, '90%': { opacity: '0.4' }, '100%': { opacity: '0', transform: 'translateY(-280px) scale(1.2)' } },
        shootAnim:   { '0%': { opacity: '0', transform: 'translateX(0) translateY(0)' }, '5%': { opacity: '1' }, '80%': { opacity: '.8' }, '100%': { opacity: '0', transform: 'translateX(-280px) translateY(140px)' } },
        orbPulse:    { '0%': { opacity: '.4', transform: 'scale(0.8)' }, '100%': { opacity: '.9', transform: 'scale(1.3)' } },
        groundPulse: { '0%': { opacity: '.5' }, '100%': { opacity: '1' } },
        bgEmFloat:   { '0%': { opacity: '0', transform: 'translateY(40px) rotate(0deg) scale(0.6)' }, '10%': { opacity: '.35' }, '85%': { opacity: '.25' }, '100%': { opacity: '0', transform: 'translateY(-260px) rotate(360deg) scale(1)' } },
        ringPop:     { '0%,100%': { opacity: '0', transform: 'scale(0.95)' }, '50%': { opacity: '1', transform: 'scale(1.05)' } },
        goalGlow:    { '0%': { boxShadow: '0 0 8px #ffe44d44' }, '100%': { boxShadow: '0 0 20px #ffe44daa, 0 0 40px #ffe44d33' } },
        cd:          { '0%,100%': { opacity: '1' }, '50%': { opacity: '.2' } },
        divPulse:    { '0%': { boxShadow: '0 0 4px #ffe44d44' }, '100%': { boxShadow: '0 0 14px #ffe44daa, 0 0 28px #ffe44d33' } },
        vsWiggle:    { '0%,100%': { transform: 'translate(-50%,0) scale(1)' }, '50%': { transform: 'translate(-50%,0) scale(1.12)' } },
        cstand:      { from: { transform: 'translateY(0)' }, to: { transform: 'translateY(-5px)' } },
        cjump:       { '0%': { transform: 'translateY(0) scaleX(1.05) scaleY(.9)' }, '15%': { transform: 'translateY(-38px) scaleX(.9) scaleY(1.1) rotate(-6deg)' }, '45%': { transform: 'translateY(-56px) scaleX(.88) scaleY(1.15) rotate(5deg)' }, '75%': { transform: 'translateY(-20px) scaleX(1.02) scaleY(.95)' }, '100%': { transform: 'translateY(0) scaleX(1) scaleY(1)' } },
        bslam:       { from: { transform: 'scaleX(.3) scaleY(.2)', opacity: '0' }, to: { transform: 'none', opacity: '1' } },
        bremove:     { from: { transform: 'none', opacity: '1' }, to: { transform: 'scaleX(.2) scaleY(.1)', opacity: '0' } },
        waterShimmer:{ '0%': { transform: 'translateX(-5%)' }, '100%': { transform: 'translateX(5%)' } },
        wv:          { from: { transform: 'translateX(0)' }, to: { transform: 'translateX(-56px)' } },
        wp:          { from: { transform: 'scale(.35) rotate(-7deg)', opacity: '0' }, to: { transform: 'none', opacity: '1' } },
        wd:          { from: { transform: 'rotate(-14deg) translateY(-6px) scale(1.05)' }, to: { transform: 'rotate(14deg) translateY(6px) scale(.96)' } },
        ws:          { to: { transform: 'rotate(360deg)' } },
        cf:          { '0%': { transform: 'translateY(-30px) rotate(0)', opacity: '1' }, '100%': { transform: 'translateY(95vh) rotate(800deg)', opacity: '0' } },
        sabFlash:    { '0%': { filter: 'brightness(1)' }, '30%': { filter: 'brightness(2.5) saturate(0)' }, '100%': { filter: 'brightness(1)' } },
        fup:         { '0%': { opacity: '1', transform: 'translateY(0) scale(1)' }, '100%': { opacity: '0', transform: 'translateY(-60px) scale(1.4)' } },
        fi:          { from: { opacity: '0', transform: 'translateX(4px)' }, to: { opacity: '1', transform: 'none' } },
      },
      animation: {
        lp:          'lp 1.2s infinite',
        skyShift:    'skyShift 12s ease-in-out infinite alternate',
        auroraPulse: 'auroraPulse var(--dur,8s) ease-in-out var(--del,0s) infinite alternate',
        floatUp:     'floatUp var(--fd,6s) linear var(--fde,0s) infinite',
        shootAnim:   'shootAnim var(--sd,1.2s) linear var(--sde,0s) forwards',
        orbPulse:    'orbPulse var(--od,5s) ease-in-out var(--ode,0s) infinite alternate',
        groundPulse: 'groundPulse 3s ease-in-out infinite alternate',
        bgEmFloat:   'bgEmFloat var(--ef,8s) linear var(--efd,0s) infinite',
        ringPop:     'ringPop 2s ease-in-out infinite',
        goalGlow:    'goalGlow 2s ease-in-out infinite alternate',
        cd:          'cd 1.4s infinite',
        divPulse:    'divPulse 2s ease-in-out infinite alternate',
        vsWiggle:    'vsWiggle 3s ease-in-out infinite',
        cstand:      'cstand .75s ease-in-out infinite alternate',
        bslam:       'bslam .15s cubic-bezier(.2,0,.1,1)',
        waterShimmer:'waterShimmer 4s ease-in-out infinite alternate',
        wv:          'wv 1.8s linear infinite',
        wp:          'wp .5s cubic-bezier(.2,0,.1,1)',
        wd:          'wd .5s ease-in-out infinite alternate',
        ws:          'ws 4s linear infinite',
        fi:          'fi .18s ease',
        fup:         'fup .8s ease forwards',
      },
    }
  }
}
</script>
<style>
  html,body { height:100%; overflow:hidden; }
  *  { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Nunito',sans-serif; }
  ::-webkit-scrollbar { width:2px; }
  ::-webkit-scrollbar-thumb { background:#1e2d40; }

  /* sky bg */
  #sky-bg {
    background:linear-gradient(180deg,#2a0a4a 0%,#0d1f6b 25%,#1a4a8a 55%,#2a7abf 80%,#4a9fd4 100%);
    animation: skyShift 12s ease-in-out infinite alternate;
  }
  @keyframes skyShift { 0%{filter:hue-rotate(0deg)brightness(1)} 33%{filter:hue-rotate(15deg)brightness(1.08)} 66%{filter:hue-rotate(-10deg)brightness(.95)} 100%{filter:hue-rotate(20deg)brightness(1.05)} }

  /* aurora */
  .aurora-band { position:absolute;border-radius:50%;mix-blend-mode:screen;opacity:.35;filter:blur(28px);animation:auroraPulse var(--dur,8s) ease-in-out var(--del,0s) infinite alternate; }
  @keyframes auroraPulse { 0%{transform:translateX(-5%)scaleY(.7)skewX(-5deg)} 40%{transform:translateX(3%)scaleY(1.2)skewX(3deg)} 100%{transform:translateX(8%)scaleY(.9)skewX(-2deg)} }
  .ab1{width:120%;height:180px;top:-40px;left:-10%;background:linear-gradient(90deg,#00d4ff88,#ff3a8c55,#ffe44d44,#00d4ff66);--dur:7s;--del:0s;}
  .ab2{width:100%;height:140px;top:10px;left:5%;background:linear-gradient(90deg,#ff3a8caa,#00d4ff44,#ff3a8c66);--dur:9s;--del:2s;}
  .ab3{width:90%;height:100px;top:30px;left:8%;background:linear-gradient(90deg,#ffe44d55,#00d4ff33,#ff3a8c44);--dur:6s;--del:1.5s;}

  /* particles */
  .particle { position:absolute;border-radius:50%;animation:floatUp var(--fd,6s) linear var(--fde,0s) infinite;opacity:0; }
  @keyframes floatUp { 0%{opacity:0;transform:translateY(0)scale(.5)} 10%{opacity:.7} 90%{opacity:.4} 100%{opacity:0;transform:translateY(-280px)scale(1.2)} }

  /* shooting stars */
  .shoot { position:absolute;height:2px;border-radius:2px;animation:shootAnim var(--sd,1.2s) linear var(--sde,0s) forwards;opacity:0;z-index:4;pointer-events:none; }
  @keyframes shootAnim { 0%{opacity:0;transform:translateX(0)translateY(0)} 5%{opacity:1} 80%{opacity:.8} 100%{opacity:0;transform:translateX(-280px)translateY(140px)} }

  /* bg emojis */
  .bg-em { position:absolute;font-size:1.1rem;animation:bgEmFloat var(--ef,8s) linear var(--efd,0s) infinite;opacity:0; }
  @keyframes bgEmFloat { 0%{opacity:0;transform:translateY(40px)rotate(0)scale(.6)} 10%{opacity:.35} 85%{opacity:.25} 100%{opacity:0;transform:translateY(-260px)rotate(360deg)scale(1)} }

  /* orbs */
  .orb { position:absolute;border-radius:50%;animation:orbPulse var(--od,5s) ease-in-out var(--ode,0s) infinite alternate;pointer-events:none;z-index:2; }
  @keyframes orbPulse { 0%{opacity:.4;transform:scale(.8)} 100%{opacity:.9;transform:scale(1.3)} }
  #orb-boy  { width:220px;height:220px;left:-40px;bottom:30%;background:radial-gradient(circle,#00d4ff55,transparent 70%);filter:blur(35px);--od:6s;--ode:0s; }
  #orb-girl { width:200px;height:200px;right:-30px;bottom:25%;background:radial-gradient(circle,#ff3a8c55,transparent 70%);filter:blur(35px);--od:7s;--ode:1.5s; }

  /* ground glow */
  #ground-glow { position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(0deg,#1a6a9a88,transparent);z-index:5;pointer-events:none;animation:groundPulse 3s ease-in-out infinite alternate; }
  @keyframes groundPulse { 0%{opacity:.5} 100%{opacity:1} }

  /* goal glow */
  @keyframes goalGlow { 0%{box-shadow:0 0 8px #ffe44d44} 100%{box-shadow:0 0 20px #ffe44daa,0 0 40px #ffe44d33} }
  #goal-bar { animation:goalGlow 2s ease-in-out infinite alternate; }

  /* divider */
  #div-line { animation:divPulse 2s ease-in-out infinite alternate; }
  @keyframes divPulse { 0%{box-shadow:0 0 4px #ffe44d44} 100%{box-shadow:0 0 14px #ffe44daa,0 0 28px #ffe44d33} }
  #div-line::after { content:'VS';position:absolute;top:46%;transform:translate(-50%,0);left:50%;background:#000000ee;border:2px solid #ffe44d;border-radius:7px;color:#ffe44d;font-family:'Bungee Inline',cursive;font-size:.68rem;padding:2px 5px;animation:vsWiggle 3s ease-in-out infinite; }
  @keyframes vsWiggle { 0%,100%{transform:translate(-50%,0)scale(1)} 50%{transform:translate(-50%,0)scale(1.12)} }

  /* cam dot */
  .cdot { width:6px;height:6px;border-radius:50%;animation:cd 1.4s infinite; }
  #cam-boy .cdot { background:#00d4ff; }
  #cam-girl .cdot { background:#ff3a8c; }
  @keyframes cd { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* character */
  .char-emoji { animation:cstand .75s ease-in-out infinite alternate;transform-origin:bottom center;display:block; }
  @keyframes cstand { from{transform:translateY(0)} to{transform:translateY(-5px)} }
  @keyframes cjump  { 0%{transform:translateY(0)scaleX(1.05)scaleY(.9)} 15%{transform:translateY(-38px)scaleX(.9)scaleY(1.1)rotate(-6deg)} 45%{transform:translateY(-56px)scaleX(.88)scaleY(1.15)rotate(5deg)} 75%{transform:translateY(-20px)scaleX(1.02)scaleY(.95)} 100%{transform:translateY(0)scaleX(1)scaleY(1)} }
  .char-emoji.jumping { animation:cjump .55s ease !important; }

  /* blocks */
  .block { height:24px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Bungee',cursive;font-size:.68rem;color:rgba(255,255,255,.85);position:relative;animation:bslam .15s cubic-bezier(.2,0,.1,1); }
  @keyframes bslam { from{transform:scaleX(.3)scaleY(.2);opacity:0} to{transform:none;opacity:1} }
  .block.removing { animation:bremove .2s ease forwards !important; }
  @keyframes bremove { from{transform:none;opacity:1} to{transform:scaleX(.2)scaleY(.1);opacity:0} }

  .boy-side .block:nth-child(odd)  { background:linear-gradient(180deg,#00c8ee,#0099bb);border-top:2px solid #00eeff88;border-bottom:1px solid #006688; }
  .boy-side .block:nth-child(even) { background:linear-gradient(180deg,#00aacc,#007a99);border-top:2px solid #00ccee88;border-bottom:1px solid #005577; }
  .boy-side .block::after  { content:'';position:absolute;right:-6px;top:0;bottom:0;width:6px;background:linear-gradient(180deg,#005566,#003344);clip-path:polygon(0 0,100% 6px,100% 100%,0 100%); }
  .boy-side .block::before { content:'';position:absolute;top:-5px;left:0;right:-6px;height:5px;background:linear-gradient(90deg,#00eeff,#00ccdd);clip-path:polygon(0 100%,6px 0,100% 0,100% 100%); }

  .girl-side .block:nth-child(odd)  { background:linear-gradient(180deg,#ff3080,#cc0058);border-top:2px solid #ff88bb88;border-bottom:1px solid #880040; }
  .girl-side .block:nth-child(even) { background:linear-gradient(180deg,#ee1060,#bb0046);border-top:2px solid #ff60aa88;border-bottom:1px solid #770033; }
  .girl-side .block::after  { content:'';position:absolute;right:-6px;top:0;bottom:0;width:6px;background:linear-gradient(180deg,#770030,#440018);clip-path:polygon(0 0,100% 6px,100% 100%,0 100%); }
  .girl-side .block::before { content:'';position:absolute;top:-5px;left:0;right:-6px;height:5px;background:linear-gradient(90deg,#ff80bb,#ff4490);clip-path:polygon(0 100%,6px 0,100% 0,100% 100%); }

  /* water */
  #water::before { content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,212,255,.15) 0%,rgba(255,58,140,.1) 50%,rgba(0,212,255,.15) 100%);animation:waterShimmer 4s ease-in-out infinite alternate; }
  @keyframes waterShimmer { 0%{transform:translateX(-5%)} 100%{transform:translateX(5%)} }
  #water::after { content:'';position:absolute;top:0;left:0;right:0;height:12px;background:repeating-linear-gradient(90deg,#1a8acc 0,#1a8acc 28px,#1a6a9a 28px,#1a6a9a 56px);animation:wv 1.8s linear infinite; }
  @keyframes wv { from{transform:translateX(0)} to{transform:translateX(-56px)} }

  /* surge */
  #surge { position:absolute;top:9%;left:50%;transform:translateX(-50%);font-family:'Bungee Inline',cursive;font-size:1.05rem;padding:4px 20px;border-radius:20px;pointer-events:none;opacity:0;transition:opacity .25s;z-index:50;white-space:nowrap;text-shadow:0 2px 6px #0008; }
  #surge.show { opacity:1; }
  #surge.bs  { background:linear-gradient(90deg,#006699,#00d4ff); }
  #surge.gs  { background:linear-gradient(90deg,#aa0044,#ff3a8c); }
  #surge.sab { background:linear-gradient(90deg,#664400,#ff8800); }
  .side.sabotaged { animation:sabFlash .4s ease; }
  @keyframes sabFlash { 0%{filter:brightness(1)} 30%{filter:brightness(2.5)saturate(0)} 100%{filter:brightness(1)} }

  /* fx */
  .fxn { position:absolute;pointer-events:none;z-index:60;font-family:'Bungee',cursive;font-size:1.2rem;font-weight:900;animation:fup .8s ease forwards;text-shadow:0 2px 8px #0009; }
  @keyframes fup { 0%{opacity:1;transform:translateY(0)scale(1)} 100%{opacity:0;transform:translateY(-60px)scale(1.4)} }

  /* win overlay */
  #win-box { animation:wp .5s cubic-bezier(.2,0,.1,1); }
  @keyframes wp { from{transform:scale(.35)rotate(-7deg);opacity:0} to{transform:none;opacity:1} }
  .wsp { position:absolute;inset:-40%;animation:ws 4s linear infinite;opacity:.08; }
  @keyframes ws { to{transform:rotate(360deg)} }
  .wc  { font-size:3.5rem;display:block;animation:wd .5s ease-in-out infinite alternate; }
  @keyframes wd { from{transform:rotate(-14deg)translateY(-6px)scale(1.05)} to{transform:rotate(14deg)translateY(6px)scale(.96)} }
  .conf { position:absolute;pointer-events:none;z-index:210;animation:cf var(--s,1.6s) linear var(--d,0s) forwards;border-radius:2px; }
  @keyframes cf { 0%{transform:translateY(-30px)rotate(0);opacity:1} 100%{transform:translateY(95vh)rotate(800deg);opacity:0} }

  /* feed entry */
  .fev { font-size:.62rem;background:#ffffff06;border-radius:4px;padding:2px 6px;border-left:3px solid transparent;display:flex;align-items:center;gap:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;animation:fi .18s ease; }
  .fev.boy  { border-color:#00d4ff; }
  .fev.girl { border-color:#ff3a8c; }
  .fev.sab  { border-color:#ff8800; }
  @keyframes fi { from{opacity:0;transform:translateX(4px)} to{opacity:1;transform:none} }
  .ftag { font-size:.58rem;border-radius:8px;padding:0 4px;margin-left:2px; }
  .ftag.boy  { background:#00d4ff22;color:#00d4ff; }
  .ftag.girl { background:#ff3a8c22;color:#ff3a8c; }
  .ftag.sab  { background:#ff880022;color:#ff8800; }

  /* tower world camera */
  .tower-world { transition:transform .2s cubic-bezier(0,0,.2,1); }

  /* score ring */
  .score-ring { position:absolute;inset:-4px;border-radius:50%;border:2px solid transparent;animation:ringPop 2s ease-in-out infinite;pointer-events:none;z-index:10; }
  @keyframes ringPop { 0%,100%{opacity:0;transform:scale(.95)} 50%{opacity:1;transform:scale(1.05)} }
  .boy-side  .score-ring { border-color:#00d4ff44; }
  .girl-side .score-ring { border-color:#ff3a8c44; }

  /* mobile panel */
  #rpanel { transition:transform .25s ease; }
  #panel-backdrop { transition:opacity .25s ease; }

  @media (max-width: 768px) {
    #wboard  { display:none; }
    #rpanel  { position:fixed;inset:0;z-index:200;width:100%;transform:translateX(100%);overflow-y:auto; }
    #rpanel.open { transform:translateX(0); }
    #panel-backdrop { position:fixed;inset:0;z-index:199;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);opacity:0;pointer-events:none; }
    #panel-backdrop.show { opacity:1;pointer-events:auto; }
    #bbar { grid-template-columns:1fr 1fr; }
    #mob-bar { display:flex; }
  }
  @media (min-width:769px) {
    #panel-backdrop { display:none; }
    #mob-bar { display:none; }
  }
</style>
</head>
<body class="bg-panel text-white flex flex-col h-full overflow-hidden">

<!-- HEADER -->
<div class="h-9 flex-shrink-0 flex items-center gap-2 px-3 border-b border-border" style="background:#06101a">
  <div class="font-bungee-inline text-[.88rem] whitespace-nowrap">
    <span class="text-boy">👦 BOYS</span> &nbsp;VS&nbsp; <span class="text-girl">GIRLS 👧</span>
  </div>
  <div class="flex items-center gap-1 bg-white/[.06] border border-border rounded-full px-2.5 py-0.5 text-[.68rem] font-black">👥 <span id="sv">0</span></div>
  <div class="flex items-center gap-1 bg-white/[.06] border border-border rounded-full px-2.5 py-0.5 text-[.68rem] font-black">🏁 <span id="sr">0</span></div>
  <span id="live-pill" class="bg-girl rounded-full px-2 py-0.5 text-[.63rem] font-black tracking-widest opacity-0 invisible transition-opacity">● LIVE</span>
  <div class="flex-1"></div>
  <span class="ndot w-[7px] h-[7px] rounded-full bg-[#333] flex-shrink-0 transition-all" id="ndot"></span>
  <span id="net-txt" class="text-[.65rem] text-[#4a6a8a]">OFFLINE</span>
</div>

<!-- MAIN -->
<div id="main" class="flex flex-1 overflow-hidden min-h-0">

  <!-- WIN BOARD (desktop) -->
  <div id="wboard" class="w-[110px] flex-shrink-0 bg-panel border-r border-border flex flex-col">
    <div class="px-2 py-1.5 font-bungee text-[.68rem] text-gold text-center border-b border-border">🏆 WINS</div>
    <div id="wb-list" class="flex-1 overflow-y-auto p-1.5">
      <div class="text-[#4a6a8a] text-[.58rem] p-2 text-center leading-relaxed">No wins<br>yet!</div>
    </div>
  </div>

  <!-- GAME AREA -->
  <div id="game" class="flex-1 flex flex-col relative overflow-hidden min-w-0">

    <!-- SKY -->
    <div id="sky" class="flex-1 relative overflow-hidden">
      <div id="sky-bg" class="absolute inset-0 z-0"></div>
      <div id="aurora" class="absolute inset-0 z-[1] pointer-events-none overflow-hidden">
        <div class="aurora-band ab1"></div>
        <div class="aurora-band ab2"></div>
        <div class="aurora-band ab3"></div>
      </div>
      <canvas id="stars-canvas" class="absolute inset-0 z-[2] pointer-events-none"></canvas>
      <div id="particles" class="absolute inset-0 z-[3] pointer-events-none overflow-hidden"></div>
      <div id="bg-emojis" class="absolute inset-0 z-[3] pointer-events-none overflow-hidden"></div>
      <div class="orb" id="orb-boy"></div>
      <div class="orb" id="orb-girl"></div>
      <div id="ground-glow"></div>

      <!-- Goal + chat hint -->
      <div class="absolute top-2 left-1/2 -translate-x-1/2 flex flex-col items-center gap-1 z-[30]">
        <div id="goal-bar" class="bg-black/75 border-2 border-gold rounded-2xl px-3.5 py-1 font-bungee text-[.7rem] text-gold whitespace-nowrap">🎯 GOAL: <span id="gv">200</span></div>
        <div class="bg-black/65 border border-white/[.13] rounded-2xl px-3.5 py-1 font-bungee text-[.63rem] flex gap-2.5 items-center whitespace-nowrap">
          <span class="text-boy">💬 B = BOYS</span>
          <span class="text-white/20">|</span>
          <span class="text-girl">G = GIRLS</span>
        </div>
      </div>

      <div id="surge"></div>

      <!-- Divider -->
      <div id="div-line" class="absolute top-0 bottom-0 left-1/2 -translate-x-1/2 w-[3px] z-20 pointer-events-none"

<script>
const GOAL           = 200;
const GIFT_BOY_ADD   = 5583;
const GIFT_GIRL_ADD  = 5655;
const GIFT_SAB_GIRLS = 8913;
const GIFT_SAB_BOYS  = 9947;

const S = { boy:{ score:0, blocks:0 }, girl:{ score:0, blocks:0 } };
const wins = { boy:0, girl:0 };
let gameOver=false, totalViewers=0, totalRaces=0;
let connected=false, ws=null, autoTimer=null, surgeTimer=null;

// ── STARS ──
(function initStars(){
  const canvas=document.getElementById('stars-canvas');
  const ctx=canvas.getContext('2d');
  let stars=[],W,H;
  function resize(){
    W=canvas.width=canvas.offsetWidth; H=canvas.height=canvas.offsetHeight;
    stars=[];
    for(let i=0;i<90;i++) stars.push({x:Math.random()*W,y:Math.random()*H*.7,r:Math.random()*1.5+.3,a:Math.random(),da:(Math.random()*.008+.002)*(Math.random()<.5?1:-1),col:Math.random()<.3?'#00d4ff':Math.random()<.5?'#ff3a8c':'#ffffff'});
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    stars.forEach(s=>{
      s.a+=s.da; if(s.a<=0||s.a>=1)s.da*=-1;
      ctx.save();ctx.globalAlpha=s.a*.8;ctx.fillStyle=s.col;ctx.shadowColor=s.col;ctx.shadowBlur=s.r*4;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();ctx.restore();
    });
    requestAnimationFrame(draw);
  }
  resize(); draw(); window.addEventListener('resize',resize);
})();

// ── PARTICLES ──
(function initParticles(){
  const c=document.getElementById('particles');
  const all=['#00d4ff','#80eeff','#00ffcc','#ff3a8c','#ff88cc','#ff5599','#ffe44d','#ffffff'];
  function spawnP(){
    const el=document.createElement('div'); el.className='particle';
    const size=3+Math.random()*7, col=all[Math.floor(Math.random()*all.length)];
    el.style.cssText=`left:${5+Math.random()*90}%;bottom:${-5+Math.random()*30}%;width:${size}px;height:${size}px;background:${col};box-shadow:0 0 ${size*2}px ${col};--fd:${4+Math.random()*6}s;--fde:${Math.random()*4}s`;
    c.appendChild(el); setTimeout(()=>el.remove(),15000);
  }
  for(let i=0;i<18;i++) setTimeout(spawnP,i*400);
  setInterval(spawnP,700);
})();

// ── SHOOTING STARS ──
(function initShootingStars(){
  const sky=document.getElementById('sky');
  function spawnS(){
    const el=document.createElement('div'); el.className='shoot';
    const len=60+Math.random()*100, isBlue=Math.random()<.5;
    el.style.cssText=`left:${20+Math.random()*70}%;top:${2+Math.random()*30}%;width:${len}px;background:linear-gradient(90deg,transparent,${isBlue?'#00d4ff':'#ff3a8c'},white);--sd:${.8+Math.random()*.8}s;--sde:0s`;
    sky.appendChild(el); setTimeout(()=>el.remove(),3000);
  }
  function schedule(){ spawnS(); setTimeout(schedule,2200+Math.random()*4000); }
  setTimeout(schedule,1500);
})();

// ── BG EMOJIS ──
(function initBgEmojis(){
  const c=document.getElementById('bg-emojis');
  const em=['🔥','💙','💗','⭐','✨','💫','🌟','💎','👑','🌊','💥','🎯'];
  function spawnE(){
    const el=document.createElement('div'); el.className='bg-em';
    el.textContent=em[Math.floor(Math.random()*em.length)];
    el.style.cssText=`left:${5+Math.random()*88}%;bottom:0;--ef:${6+Math.random()*6}s;--efd:${Math.random()*3}s`;
    c.appendChild(el); setTimeout(()=>el.remove(),15000);
  }
  for(let i=0;i<8;i++) setTimeout(spawnE,i*600);
  setInterval(spawnE,1200);
})();

// ── TOWER CORE ──
function world(t)    { return document.getElementById(t[0]+'world'); }
function viewport(t) { return document.getElementById(t[0]+'vp'); }

function syncCamera(t){
  const vp=viewport(t), w=world(t);
  const diff=Math.max(0,w.scrollHeight-vp.clientHeight);
  w.style.transform=`translateY(${diff}px)`;
}
function renumber(w){
  const blocks=w.querySelectorAll('.block'), n=blocks.length;
  blocks.forEach((b,i)=>{ b.textContent=n-i; });
}
function addBlocks(t,count){
  if(count<=0)return;
  const w=world(t), char=w.querySelector('.char-wrap');
  for(let i=0;i<count;i++){
    const b=document.createElement('div'); b.className='block';
    char.insertAdjacentElement('afterend',b);
  }
  renumber(w); syncCamera(t); jump(t[0]+'char');
}
function removeBlocks(t,count){
  if(count<=0)return;
  const w=world(t), char=w.querySelector('.char-wrap');
  let node=char.nextSibling, removed=0; const victims=[];
  while(node&&removed<count){ if(node.classList?.contains('block')){victims.push(node);removed++;} node=node.nextSibling; }
  victims.forEach(b=>{ b.classList.add('removing'); setTimeout(el=>el.parentNode?.removeChild(el),220,b); });
  setTimeout(()=>{ renumber(w); syncCamera(t); },230);
}
function jump(id){
  const el=document.getElementById(id); if(!el)return;
  el.classList.remove('jumping'); void el.offsetWidth; el.classList.add('jumping');
}

// ── SCORE ──
function applyAdd(t,amount,user){
  if(gameOver)return;
  S[t].score+=amount;
  const want=Math.floor(S[t].score), delta=want-S[t].blocks;
  if(delta>0){ S[t].blocks=want; addBlocks(t,delta); }
  if(amount>=1||Math.random()<.2) fx(t,'+'+(Number.isInteger(amount)?amount:amount.toFixed(1)),'#00ff88');
  feed(user,t,'add',amount);
  const opp=t==='boy'?'girl':'boy';
  if(S[t].score-S[opp].score>20&&Math.random()<.18) surge(t,'lead');
  if(S[t].score>=GOAL) win(t);
}
function applySab(t,amount,user){
  if(gameOver)return;
  const before=S[t].score;
  S[t].score=Math.max(0,S[t].score-amount);
  const want=Math.floor(S[t].score), delta=S[t].blocks-want;
  if(delta>0){ S[t].blocks=want; removeBlocks(t,delta); }
  const lost=Math.round(before-S[t].score);
  fx(t,'-'+lost,'#ff8800'); feed(user,t,'sab',-lost); surge(t,'sab');
  const el=document.getElementById(t==='boy'?'bside':'gside');
  el.classList.add('sabotaged'); setTimeout(()=>el.classList.remove('sabotaged'),500);
}
function manualAdd(t,n){ applyAdd(t,n,'you'); }
function manualSab(t,n){ applySab(t,n,'you'); }

// ── FX ──
function fx(t,lbl,color){
  const side=document.getElementById(t==='boy'?'bside':'gside');
  const game=document.getElementById('game');
  const sr=side.getBoundingClientRect(), gr=game.getBoundingClientRect();
  const el=document.createElement('div'); el.className='fxn';
  el.textContent=lbl;
  el.style.cssText=`left:${sr.left-gr.left+sr.width/2-16}px;top:${sr.top-gr.top+40}px;color:${color}`;
  game.appendChild(el); setTimeout(()=>el.remove(),900);
}
function surge(t,mode){
  const b=document.getElementById('surge');
  b.className='show '+(mode==='sab'?'sab':t==='boy'?'bs':'gs');
  b.textContent=mode==='sab'
    ?(t==='boy'?'💥 GIRLS SABOTAGE BOYS! -5':'💥 BOYS SABOTAGE GIRLS! -5')
    :(t==='boy'?'💪 BOYS PULLING AHEAD!':'💅 GIRLS ON FIRE!');
  clearTimeout(surgeTimer);
  surgeTimer=setTimeout(()=>b.classList.remove('show'),2200);
}
function feed(user,t,type,amount){
  const f=document.getElementById('feed'), isSab=type==='sab';
  const d=document.createElement('div'); d.className='fev '+(isSab?'sab':t);
  const ico=isSab?'💥':(t==='boy'?'🔥':'🌹');
  d.innerHTML=`<span class="fev-u" style="font-weight:900;color:#fff">${user}</span><span class="ftag ${isSab?'sab':t}">${ico} ${isSab?amount:'+'+amount}</span>`;
  f.prepend(d); while(f.children.length>30)f.removeChild(f.lastChild);
}

// ── WIN ──
function win(t){
  gameOver=true; wins[t]++; totalRaces++;
  document.getElementById(t==='boy'?'bwn':'gwn').textContent=wins[t];
  document.getElementById('sr').textContent=totalRaces;
  updateWinBoard(); confetti(t);
  setTimeout(()=>{
    const col=t==='boy'?'#00d4ff':'#ff3a8c';
    const box=document.getElementById('win-box');
    box.style.background=t==='boy'?'linear-gradient(145deg,#003355,#005577)':'linear-gradient(145deg,#440022,#880044)';
    box.style.border=`3px solid ${col}`;
    document.getElementById('wsp').style.background=`conic-gradient(from 0deg,transparent,${col} 8%,transparent 16%)`;
    document.getElementById('wch').textContent=t==='boy'?'🧑':'👧';
    document.getElementById('wtm').textContent=t==='boy'?'BOYS WIN! 🏆':'GIRLS WIN! 🏆';
    document.getElementById('wtm').style.color=col;
    document.getElementById('wst').textContent=`${Math.floor(S[t].score)} blocks · Round ${totalRaces}`;
    const ov=document.getElementById('win-ov'); ov.style.display='flex'; ov.classList.add('show');
    document.getElementById(t==='boy'?'bchar':'gchar').style.animation='wd .35s ease-in-out infinite alternate';
    let c=5; const btn=document.getElementById('replay-btn');
    btn.textContent=`⚡ NEXT ROUND IN ${c}...`;
    autoTimer=setInterval(()=>{ c--; if(c<=0){clearInterval(autoTimer);startNew();} else btn.textContent=`⚡ NEXT ROUND IN ${c}...`; },1000);
  },1300);
}
function confetti(t){
  const cols=t==='boy'?['#00d4ff','#80eeff','#fff','#0088cc','#00ffee']:['#ff3a8c','#ff90c8','#fff','#cc0060','#ff8844'];
  const ov=document.getElementById('win-ov');
  for(let i=0;i<70;i++){
    const c=document.createElement('div'); c.className='conf';
    const w=5+Math.random()*10, h=5+Math.random()*10;
    c.style.cssText=`left:${Math.random()*100}%;top:0;width:${w}px;height:${h}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'2px'};--s:${1.2+Math.random()*2}s;--d:${Math.random()*1.8}s`;
    ov.appendChild(c); setTimeout(()=>c.remove(),5000);
  }
}
function startNew(){
  clearInterval(autoTimer);
  S.boy={score:0,blocks:0}; S.girl={score:0,blocks:0};
  gameOver=false;
  const ov=document.getElementById('win-ov'); ov.classList.remove('show'); ov.style.display='';
  document.getElementById('bchar').style.animation='';
  document.getElementById('gchar').style.animation='';
  document.getElementById('surge').className='';
  ['bworld','gworld'].forEach(id=>{ const w=document.getElementById(id); w.querySelectorAll('.block').forEach(b=>b.remove()); w.style.transform=''; });
}

function updateWinBoard(){
  const emptyMsg='<div class="text-[#4a6a8a] text-[.58rem] p-2 text-center leading-relaxed">No wins<br>yet!</div>';
  const ts=[{t:'boy',l:'Boys',i:'🧑'},{t:'girl',l:'Girls',i:'👧'}];
  ts.sort((a,b)=>wins[b.t]-wins[a.t]);

  // Desktop
  const list=document.getElementById('wb-list'); list.innerHTML='';
  let any=false;
  ts.forEach(({t,l,i})=>{
    if(!wins[t])return; any=true;
    const d=document.createElement('div');
    d.className='wbr flex items-center gap-1 bg-white/[.04] rounded-md px-1.5 py-1 text-[.68rem] font-black border-l-[3px] mb-1 '+(t==='boy'?'text-boy border-boy':'text-girl border-girl');
    d.style.borderLeftColor=t==='boy'?'#00d4ff':'#ff3a8c';
    d.innerHTML=`<span>${i}</span><span>${l}</span><span class="ml-auto bg-white/[.1] rounded-lg px-1.5 text-[.62rem] text-gold">${wins[t]}</span>`;
    list.appendChild(d);
  });
  if(!any)list.innerHTML=emptyMsg;

  // Mobile modal
  const mList=document.getElementById('mob-wb-list'); mList.innerHTML='';
  any=false;
  ts.forEach(({t,l,i})=>{
    if(!wins[t])return; any=true;
    const d=document.createElement('div');
    d.className='flex items-center gap-2 px-3 py-2 bg-white/[.04] rounded-lg border-l-[3px] text-[.78rem] font-black';
    d.style.borderLeftColor=t==='boy'?'#00d4ff':'#ff3a8c';
    d.style.color=t==='boy'?'#00d4ff':'#ff3a8c';
    d.innerHTML=`<span class="text-xl">${i}</span><span class="flex-1">${l}</span><span class="bg-white/[.1] rounded-lg px-2 py-0.5 text-[.7rem] text-gold">${wins[t]}</span>`;
    mList.appendChild(d);
  });
  if(!any)mList.innerHTML=emptyMsg;
}

function parseChatTeam(msg){
  const m=msg.trim().toUpperCase().replace(/^[\/\s]+/,'');
  if(['B','BOY','BOYS'].includes(m)) return 'boy';
  if(['G','GIRL','GIRLS'].includes(m)) return 'girl';
  return null;
}

function toggleConnect(){
  const user=document.getElementById('ttUser').value.trim().replace('@','');
  const btn=document.getElementById('conn-btn');
  if(!connected){
    if(!user){ alert('Enter TikTok username!'); return; }
    btn.textContent='⏳ CONNECTING…'; btn.disabled=true;
    try{
      ws=new WebSocket('ws://localhost:8080');
      ws.onopen=()=>{
        ws.send(JSON.stringify({action:'connect',username:user}));
        connected=true;
        btn.textContent='■ DISCONNECT';
        btn.style.background='linear-gradient(90deg,#003d1f,#006633)';
        btn.style.color='#00ff88';
        btn.disabled=false;
        document.getElementById('ndot').style.background='#00ff88';
        document.getElementById('ndot').style.boxShadow='0 0 7px #00ff88';
        document.getElementById('net-txt').textContent='@'+user;
        const pill=document.getElementById('live-pill');
        pill.style.opacity='1'; pill.style.visibility='visible'; pill.classList.add('on');
      };
      ws.onmessage=e=>{
        try{
          const d=JSON.parse(e.data);
          if(d.type==='gift'){
            const r=d.repeat||1;
            if(d.giftId==GIFT_BOY_ADD)   applyAdd('boy',2*r,d.user||'viewer');
            if(d.giftId==GIFT_GIRL_ADD)  applyAdd('girl',2*r,d.user||'viewer');
            if(d.giftId==GIFT_SAB_GIRLS) applySab('girl',5*r,d.user||'viewer');
            if(d.giftId==GIFT_SAB_BOYS)  applySab('boy',5*r,d.user||'viewer');
          } else if(d.type==='chat'){
            const t=parseChatTeam(d.msg||'');
            if(t) applyAdd(t,.5,d.user||'viewer');
          } else if(d.type==='viewer'){
            totalViewers=d.count||totalViewers;
            document.getElementById('sv').textContent=totalViewers;
          }
        }catch(err){}
      };
      ws.onerror=()=>showConnErr('Bridge not found on ws://localhost:8080');
      ws.onclose=()=>{ if(connected)showConnErr('Bridge disconnected!'); };
    }catch(e){ showConnErr('WebSocket failed: '+e.message); }
  } else {
    connected=false;
    btn.textContent='▶ GO LIVE'; btn.style.background='linear-gradient(90deg,#003355,#550030)'; btn.style.color=''; btn.disabled=false;
    document.getElementById('ndot').style.background='#333'; document.getElementById('ndot').style.boxShadow='';
    document.getElementById('net-txt').textContent='OFFLINE';
    const pill=document.getElementById('live-pill');
    pill.style.opacity='0'; pill.style.visibility='hidden'; pill.classList.remove('on');
    if(ws){try{ws.close();}catch(e){}ws=null;}
  }
}

function togglePanel(){
  const panel=document.getElementById('rpanel');
  const bd=document.getElementById('panel-backdrop');
  const open=panel.classList.toggle('open');
  bd.classList.toggle('show',open);
}
function toggleWinBoard(){
  document.getElementById('mob-wboard-modal').classList.toggle('hidden');
}

window.addEventListener('resize',()=>{ syncCamera('boy'); syncCamera('girl'); });
window.addEventListener('load',()=>{ document.getElementById('gv').textContent=GOAL; updateWinBoard(); });
